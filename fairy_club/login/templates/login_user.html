<!DOCTYPE html>
<html>
<head>
 {% load static %}
  
   <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="{% static 'members/signup.css' %}">
    <title>Signup page</title>
    <script>
        function updateTime() {
            document.getElementById('current-time').textContent = new Date().toLocaleTimeString();
        }
        window.onload = function() { updateTime(); setInterval(updateTime, 1000); };
    </script>
    <script>
      function openPolicy(){
        document.getElementById("privacyModal").style.display="flex";
      }

       function closePolicy(){
        document.getElementById("privacyModal").style.display="none";
     } 
    </script>
</head>

<body>

<div class="container">
    <div class="top">
        <div class="time-back">
        <p id="current-time"></p>
        <button id="back_button" onclick="history.back()"> &lt;  Back</button>
        </div>
        <img id="cones" src="{% static 'members/images/cones.png' %}" alt="Fairy Club Logo">
    </div>
    
    <div class="logo">
    
      <div class="intro_text">
        <h1>Login page</h1>
         <p>Step into learning magic in new world</p>
      </div>
      <img src="{% static 'members/images/logo.png' %}" alt="Fairy Club Logo">
    </div>
    
    <div class="form-container">
    <form method="POST" action="{% url 'login_user' %}">
        {% csrf_token %}


       
        <input type="email" name="email" placeholder="Enter your email"><br><br>
        <input type="password" name="password" placeholder="Password"><br><br>
        
        
        <button id="button-container" type="submit">Login</button><br><br>

        <h4>Forgot your password?<a href="{% url 'password_reset' %}">Reset it here</a></h4>
        <h4>New here?<a href="{% url 'signup' %}">Sign up here</a></h4>
        
    </form>
   
    </div>
</div>

</body>
</html>
