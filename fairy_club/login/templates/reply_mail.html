<!DOCTYPE html>
<html>
<head>
    {% load static %}
    <title>Reply to Mail</title>
</head>
<body>
    <h2>Reply to: {{ mail.mailtitel }}</h2>
    <p>{{ mail.mailbody }}</p>

    <form method="POST">
        {% csrf_token %}
        <textarea name="reply_content" rows="6" cols="40" placeholder="Write your reply..."></textarea>
        <br>
        <button type="submit">Send Reply</button>
    </form>

    <a href="{% url 'main_page' %}">Back</a>
</body>
</html>
